query CartInput {
  cart {
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
      }
    }
    buyerIdentity {
      customer {
        practitionerBinding: metafield(namespace: "cdo", key: "practitioner_id") {
          value
        }
        activeCode: metafield(namespace: "cdo", key: "active_code") {
          value
        }
      }
    }
  }
  discount {
    discountClasses
    config: metafield(namespace: "cdo", key: "config") {
      value
    }
  }
}
