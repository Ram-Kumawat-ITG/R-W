# Practitioner Portal — Customer Account UI extension (full-page).
# Renders a dedicated "Referral Portal" page inside the customer account.
# Merchants add it to the customer-account navigation menu (full-page targets
# allow direct linking by default).
api_version = "2025-10"

[[extensions]]
type = "ui_extension"
name = "Practitioner Portal"
handle = "practitioner-portal-account"
uid = "c44ecef1-d041-4fdd-8290-9c9412ab34cd"
description = "Self-service referral dashboard for practitioners inside their customer account."

[[extensions.targeting]]
module = "./src/PractitionerPortal.jsx"
target = "customer-account.page.render"

[extensions.capabilities]
# Required so the extension can fetch() the ns-retail app backend (/api/portal/*).
# Also request network access for the app in the Partner Dashboard.
network_access = true

[extensions.settings]
# The app backend base URL. Set per environment in the customer-account editor
# (dev tunnel URL locally; production application_url in prod). Read at runtime
# via shopify.settings.value.api_base_url.
[[extensions.settings.fields]]
key = "api_base_url"
type = "single_line_text_field"
name = "App backend URL"
description = "Base URL of the ns-retail app (e.g. https://app.example.com). The portal calls /api/portal/* here."
