# Learn more about configuring your checkout UI extension:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

api_version = "2026-04"

[[extensions]]
name = "checkout-ui-code"
handle = "checkout-ui-code"
type = "ui_extension"
uid = "2e611719-7d43-4632-9bdc-75ae2ffe3570"

[[extensions.targeting]]
module = "./src/Checkout.jsx"
target = "purchase.checkout.block.render"

[extensions.capabilities]
# Storefront API access — not used in step 1, kept on for later steps.
api_access = true

# REQUIRED so the Verify button can fetch() our /api/cdo/checkout-validate-code
# endpoint. In production, Shopify reviews the called domains during app
# submission.
network_access = true

# REQUIRED so the extension can BLOCK checkout progress (buyerJourney
# intercept) while a referral-code validation is unresolved. Without this,
# Shopify silently downgrades `behavior: 'block'` to `allow`. Merchants can
# toggle this under "Checkout behavior" in the checkout editor; when running
# locally it is auto-granted.
block_progress = true

# ── App URL bridge ──────────────────────────────────────────────────
# The admin app (app/routes/app.jsx loader) writes the current app URL
# to a shop metafield in the $app:cdo namespace on every admin load.
# Subscribing here makes that metafield available to this extension at
# runtime via shopify.appMetafields.value — so we can compose fetch URLs
# without hardcoding anything.
[[extensions.metafields]]
namespace = "$app:cdo"
key = "app_url"
