# order-hold-check — Shopify cart/checkout VALIDATION Function.
#
# Blocks a practitioner from placing a NEW order at checkout when they have an
# outstanding failed invoice (card retries exhausted / unpaid). Functions can't
# call our DB/API, so the block signal is an APP-OWNED customer metafield
# ($app:wholesale.order_hold) that the app keeps in sync
# (services/order/orderHold.service.js → services/shopify setCustomerOrderHoldMetafield):
#   • value "held" → this Function returns a checkout validation error (order
#     cannot be placed) with the support message.
#   • metafield absent/empty → no error, checkout proceeds.
#
# This is the ONLY layer that truly PREVENTS an order at checkout — the
# orders/create webhook only PARKS an order after it's already been placed.
#
# After scaffolding, before first deploy, run from this folder:
#   npm install
#   npm run shopify -- app function schema      # writes schema.graphql
#   npm run typegen                             # writes generated/api
# then `shopify app deploy` from the wholesale root. The app-owned metafield is
# created automatically the first time the app writes it (metafieldsSet with the
# $app reserved namespace); no manual metafield definition is required for the
# Function to read it.
api_version = "2026-04"

[[extensions]]
name = "Order hold checkout block"
handle = "order-hold-check"
type = "function"
description = "Blocks checkout for practitioners with an outstanding failed invoice."

  [[extensions.targeting]]
  target = "cart.validations.generate.run"
  input_query = "src/cart_validations_generate_run.graphql"
  export = "cart-validations-generate-run"

  [extensions.build]
  command = ""
  path = "dist/function.wasm"
