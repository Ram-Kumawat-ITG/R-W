# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "5aa8370722bac54a4329fdab09f5575d"
name = "Natural Solutions App"
application_url = "https://e630-182-70-242-149.ngrok-free.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled" 

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["customers/delete"]
  uri = "/webhooks/customers/delete"

  [[webhooks.subscriptions]]
  topics = ["customers/create"]
  uri = "/webhooks/customers/create"

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  # NOTE: `orders/create` is a protected customer data topic and CANNOT
  # be declared here until the app is approved in the Partners dashboard
  # (Partners → App → API access → Protected customer data access).
  # Until then it is registered programmatically after install — see
  # app/services/shopify/registerWebhooks.server.js.

  [[webhooks.subscriptions]]
  topics = [ "products/create" ]
  uri = "/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# NOTE: `read_customers` is protected customer data and requires Partners
# dashboard approval before it can be requested. `read_orders` is unprotected.
scopes = "read_orders,write_products,write_files,write_customers,read_inventory,write_inventory"

[auth]
redirect_urls = [ "https://e630-182-70-242-149.ngrok-free.app/api/auth" ]

[app_proxy]
url = "https://e630-182-70-242-149.ngrok-free.app"
subpath = "wholesale-application"
prefix = "apps"
